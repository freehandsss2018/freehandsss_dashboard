<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freehandsss 訂單控制台</title>
    <style>
        :root {
            --primary: #D4A373;
            --secondary: #FAEDCD;
            --dark: #4A4E69;
            --bg: #FEFAE0;
            --white: #FFFFFF;
            --danger: #E63946;
        }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { display: flex; gap: 30px; max-width: 1200px; width: 100%; align-items: flex-start; }
        
        /* 左側表單區 */
        .form-section { flex: 1; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-section h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; transition: border 0.3s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        
        /* 動態產品區塊設計 */
        .product-list { margin-bottom: 20px; }
        .product-block { background: #fdfbf7; border: 2px dashed #eaddcc; padding: 20px; border-radius: 8px; margin-bottom: 15px; position: relative; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .add-btn { background: var(--secondary); color: var(--dark); border: 2px solid var(--primary); padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; text-align: center; display: block; margin-bottom: 20px; transition: 0.3s; }
        .add-btn:hover { background: var(--primary); color: white; }

        /* 右側預覽區 */
        .preview-section { flex: 1; background: var(--dark); color: var(--white); padding: 30px; border-radius: 12px; position: sticky; top: 20px; }
        .preview-section h2 { margin-top: 0; color: var(--secondary); border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px;}
        textarea#output-preview { width: 100%; min-height: 500px; background: #2A2D43; color: #FFF; border: none; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; resize: none; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-n8n { background: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2>📝 Freehandsss 建檔中心</h2>
        
        <div class="row">
            <div class="form-group">
                <label>聯絡人稱呼 (Mom Name)</label>
                <input type="text" id="momName" placeholder="例如：Christy" oninput="generateOutput()">
            </div>
            <div class="form-group">
                <label>約定取模時間 (或狀態)</label>
                <input type="text" id="appDate" placeholder="例如：17/7 11:30 或 待定" value="待定" oninput="generateOutput()">
            </div>
        </div>

        <hr style="border:1px solid #eee; margin:20px 0;">

        <div id="productList" class="product-list">
            </div>
        
        <button class="add-btn" onclick="addProductBlock()">➕ 新增產品項目</button>

        <hr style="border:1px solid #eee; margin:20px 0;">

        <div class="row">
            <div class="form-group">
                <label>已付訂金/全數 ($)</label>
                <input type="number" id="deposit" placeholder="純數字" value="0" oninput="generateOutput()">
            </div>
            <div class="form-group">
                <label>未付產品尾數 ($)</label>
                <input type="number" id="balance" placeholder="純數字" value="0" oninput="generateOutput()">
            </div>
            <div class="form-group">
                <label>附加費用 ($)</label>
                <input type="number" id="additional" placeholder="車費/加大" value="0" oninput="generateOutput()">
            </div>
        </div>
    </div>

    <div class="preview-section">
        <h2>📱 IG 訊息生成與系統推送</h2>
        <textarea id="output-preview" readonly></textarea>
        <button class="btn" onclick="copyToClipboard()">📋 一鍵複製 IG 確認訊息</button>
        <button class="btn btn-n8n" onclick="sendTon8n()">🚀 寫入系統 (開發中)</button>
    </div>
</div>

<script>
    const subCategories = {
        "立體擺設": ["木框款式", "玻璃瓶款式"],
        "金屬飾品": ["鎖匙扣", "頸鏈吊飾", "兩者皆有"]
    };

    let blockCounter = 0;

    // 自動生成訂單編號
    function generateOrderID() {
        const date = new Date();
        const yy = String(date.getFullYear()).slice(-2);
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `FHS-${yy}${mm}${dd}-${Math.floor(Math.random() * 900000 + 100000)}`;
    }
    let currentOrderID = generateOrderID();

    // 網頁載入時，先給一個預設的產品區塊
    window.onload = function() {
        addProductBlock();
    };

    // 新增產品區塊
    function addProductBlock() {
        blockCounter++;
        const container = document.getElementById("productList");
        const block = document.createElement("div");
        block.className = "product-block";
        block.id = `block-${blockCounter}`;

        block.innerHTML = `
            ${blockCounter > 1 ? `<button class="remove-btn" onclick="removeProductBlock('${block.id}')">✖ 刪除此項目</button>` : ''}
            <div class="row">
                <div class="form-group">
                    <label>大類別</label>
                    <select class="main-cat" onchange="updateDynamicFields(this, '${block.id}')">
                        <option value="立體擺設">立體擺設</option>
                        <option value="金屬飾品">金屬飾品</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>款式細項</label>
                    <select class="sub-cat" onchange="generateOutput()"></select>
                </div>
            </div>
            <div class="form-group">
                <label class="qty-label">倒模/項目數量</label>
                <input type="text" class="item-qty" placeholder="例：一手一腳" oninput="generateOutput()">
            </div>
            <div class="form-group">
                <label class="detail-label">框色/材質細節</label>
                <input type="text" class="item-detail" placeholder="例：粉紅色 / 透明" oninput="generateOutput()">
            </div>
            <div class="form-group">
                <label>客製化刻字</label>
                <input type="text" class="item-engraving" placeholder="例：倒模當天填寫 / LUCA 1223" oninput="generateOutput()">
            </div>
        `;
        container.appendChild(block);
        
        // 初始化剛剛新增的區塊欄位
        updateDynamicFields(block.querySelector('.main-cat'), block.id);
    }

    // 移除產品區塊
    function removeProductBlock(blockId) {
        document.getElementById(blockId).remove();
        generateOutput();
    }

    // 根據大類別，動態切換細項與 Placeholder (絕對分離不干擾)
    function updateDynamicFields(selectObj, blockId) {
        const block = document.getElementById(blockId);
        const subCatSelect = block.querySelector('.sub-cat');
        const qtyLabel = block.querySelector('.qty-label');
        const qtyInput = block.querySelector('.item-qty');
        const detailLabel = block.querySelector('.detail-label');
        const detailInput = block.querySelector('.item-detail');
        const mainCat = selectObj.value;

        // 更新細項下拉選單
        subCatSelect.innerHTML = "";
        subCategories[mainCat].forEach(sub => {
            let option = document.createElement("option");
            option.value = sub;
            option.text = sub;
            subCatSelect.appendChild(option);
        });

        // 動態切換提示詞與標籤
        if (mainCat === "立體擺設") {
            qtyLabel.innerText = "倒模數量";
            qtyInput.placeholder = "例：一手一腳 (請勿填寫金屬數量)";
            detailLabel.innerText = "框色/配件細節";
            detailInput.placeholder = "例：粉紅色 / 透明木色";
        } else {
            qtyLabel.innerText = "金屬項目數量";
            qtyInput.placeholder = "例：各1共4隻 / 1條頸鏈";
            detailLabel.innerText = "金屬材質/顏色";
            detailInput.placeholder = "例：925純銀 / 金色";
        }

        generateOutput();
    }

    // 彙整所有資料，生成最終 IG 訊息
    function generateOutput() {
        const momName = document.getElementById("momName").value || "[請填寫]";
        const appDate = document.getElementById("appDate").value || "[請填寫]";
        const deposit = document.getElementById("deposit").value || "0";
        const balance = document.getElementById("balance").value || "0";
        const additional = document.getElementById("additional").value || "0";

        let productText = "";
        let hasPlaster = false;
        let hasMetal = false;

        const blocks = document.querySelectorAll('.product-block');
        blocks.forEach((block, index) => {
            const mainCat = block.querySelector('.main-cat').value;
            const subCat = block.querySelector('.sub-cat').value;
            const qty = block.querySelector('.item-qty').value || "[請填寫數量]";
            const detail = block.querySelector('.item-detail').value || "[請填寫細節]";
            const eng = block.querySelector('.item-engraving').value || "[請填寫刻字]";

            if (mainCat === "立體擺設") hasPlaster = true;
            if (mainCat === "金屬飾品") hasMetal = true;

            productText += `【項目 ${index + 1}】\n產品大類：${mainCat} (${subCat})\n項目數量：${qty}\n款式細節：${detail}\n客製化刻字：${eng}\n\n`;
        });

        // 智慧免責聲明組合
        let disclaimer = "";
        if (hasPlaster) disclaimer += "手模會因BB郁動而有所瑕疵，需否再次倒模取決於倒模師 (額外取模另+$150)。作品全人手製作且不包照片，未能十全十美，完美主義者請慎重考慮。\n\n";
        if (hasMetal) disclaimer += "手工金屬飾品因鑄造技巧及體積縮減，不能完全呈現完美紋理。金屬刮痕、微小凹凸點屬正常現象，非瑕疵範圍，不接受因此退貨。製成品最少需預三個多月。\n";

        const outputText = `📝 freehandsss 訂單核對表
(訂單編號：${currentOrderID})

【排程資訊】
聯絡人稱呼：${momName}
約定取模時間：${appDate}

【產品資訊】
${productText}【財務結算】
已付訂金/全數：$ ${deposit}
未付產品尾數：$ ${balance}
附加費用(車費/加大)：$ ${additional}

—— 以下為免責聲明 (系統不作記錄) ——
${disclaimer}`;

        document.getElementById("output-preview").value = outputText;
    }

    // 複製功能
    function copyToClipboard() {
        const copyText = document.getElementById("output-preview");
        copyText.select();
        document.execCommand("copy");
        alert("✅ IG 訂單確認訊息已複製！");
    }

    function sendTon8n() {
        alert("準備就緒！下一步：將這裡的資料打包成 JSON，發送到 Fat Mo 的 Synology n8n Webhook。");
    }
</script>

</body>
</html>
