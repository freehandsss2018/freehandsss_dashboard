<!DOCTYPE html>
<html lang="zh-HK">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FHS Dashboard V37 Trial — Stitch Integration</title>
    <!-- Tailwind CSS for functional layers -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false } }</script>
    <style>
        :root {
            /* Stitch Design Tokens: The Tactile Executive */
            --stitch-bg: #FFFFFF;
            --stitch-surface: #F8F9FA;
            --stitch-surface-container-low: #F2F4F6;
            --stitch-surface-bright: #FFFFFF;
            --stitch-primary: #3F51B5; /* Indigo accent */
            --stitch-text-prominent: #1A1C1E;
            --stitch-text-muted: #44474E;
            --stitch-border-radius: 24px;
            
            /* Legacy V37 tokens for compatibility */
            --primary: #D4A373;
            --danger: #E63946;
        }

        /* --- Global Reset & Stitch Typography --- */
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: var(--stitch-bg);
            color: var(--stitch-text-prominent);
            margin: 0;
            padding: 24px;
            padding-bottom: 120px;
            line-height: 1.5;
        }

        /* --- Tonal Layering: No-Line Rule --- */
        .card {
            background: var(--stitch-surface);
            padding: 24px;
            border-radius: var(--stitch-border-radius);
            box-shadow: none; /* Rejection of traditional shadows */
            margin-bottom: 24px;
            width: 100%;
            border: none; /* No-Line Rule */
            transition: background 0.3s ease;
        }

        .card:hover {
            background: var(--stitch-surface-container-low);
        }

        /* Depth via nesting instead of borders */
        .card-info { background: #F0F4F8; }
        .card-product { background: #FAF3EF; }
        .card-finance { background: #EBF7F1; }

        h2 {
            margin-top: 0;
            padding-bottom: 16px;
            font-size: 1.25rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--stitch-text-prominent);
            letter-spacing: -0.02em;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 11px;
            color: var(--stitch-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid transparent; /* Hidden border until focus */
            background-color: var(--stitch-surface-bright);
            border-radius: 16px;
            font-size: 16px;
            color: var(--stitch-text-prominent);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus, textarea:focus {
            background-color: #FFF;
            border-color: var(--stitch-primary);
            box-shadow: 0 0 0 4px rgba(63, 81, 181, 0.1);
            outline: none;
        }

        /* --- Pulse Indicator (Glowing Dot) --- */
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #34C759; /* Success green */
            box-shadow: 0 0 10px rgba(52, 199, 89, 0.8);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.6; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        /* --- Bottom Action Bar: Premium Native Blur --- */
        .bottom-action-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 500px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.85); /* Borrowed: 85% opacity */
            backdrop-filter: blur(24px); /* Borrowed: High blur */
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            z-index: 2000;
            display: flex;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .copy-btn {
            background: var(--stitch-primary) !important;
            border-radius: 20px;
            height: 56px;
            font-size: 16px;
            color: white;
            font-weight: 700;
            border: none;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(63, 81, 181, 0.3);
        }

        /* --- Grid for Order Center --- */
        .review-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.04em;
        }

        /* (Rest of V37 core styles would go here, simplified for preview) */
    </style>
</head>

<body>
    <!-- Trial Mode Banner -->
    <div style="background: var(--stitch-primary); color: white; text-align: center; padding: 12px; font-size: 12px; font-weight: bold; margin: -24px -24px 24px -24px; letter-spacing: 0.1em;">
        STITCH INTEGRATION PREVIEW — TRIAL MODE
    </div>

    <div class="card card-info">
        <h2>
            <div class="pulse-dot"></div>
            訂單資訊
        </h2>
        <div class="form-group">
            <label>訂單編號 (Order_ID)</label>
            <input type="text" value="FHS-STITCH-TRIAL" disabled style="background:#eee; color:#888;">
        </div>
        <div class="form-group">
            <label>聯絡人稱呼</label>
            <input type="text" placeholder="例如：陳小姐">
        </div>
    </div>

    <!-- Global Review Center (Editorial Style) -->
    <div class="card" style="background: var(--stitch-surface-container-low);">
        <h2 class="review-title">全域核對中心</h2>
        <p style="color: var(--stitch-text-muted); font-size: 14px; margin-top: -8px; margin-bottom: 20px;">
            iPhone 工作流優化：單欄 Editorial 排版與氣質分層。
        </p>
        
        <div style="background: white; border-radius: 20px; padding: 10px; min-height: 200px; display: flex; align-items: center; justify-content: center; color: #BBB; border: 1px dashed #DDD;">
            [ 這裡是 V37 的全域核對中心數據表格，已轉化為無邊框 Tonal 樣式 ]
        </div>
    </div>

    <div class="card card-product">
        <h2>🛍️ 產品選購</h2>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
            <span style="font-weight: 600;">🎨 立體擺設款式</span>
            <div class="pulse-dot" style="background: #D4A373; box-shadow: 0 0 10px rgba(212, 163, 115, 0.6);"></div>
        </div>
    </div>

    <!-- Bottom Action Bar (Borrowed: 85% Blur) -->
    <div class="bottom-action-bar">
        <button class="copy-btn">🚀 同步資產</button>
        <button style="background: #EEE; border:none; border-radius: 20px; padding: 0 20px; font-weight: 700; color: #666;">核對</button>
    </div>

    <div id="toast">已複製內容</div>

    <script>
        // Placeholder for functional logic from V37
        console.log("V37 Trial Prototype Loaded.");
    </script>
</body>

</html>
